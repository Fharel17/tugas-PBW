<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Selamat Datang di Website Sederhana</h1>
        <nav>
            <a href="#">Beranda</a>
            <a href="#">Tentang</a>
            <a href="#">Layanan</a>
            <a href="#">Kontak</a>
        </nav>
    </header>

    <div class="container">
        <main class="content">
            <h2>Formulir Pendaftaran</h2>
            <p class="subtitle">Silakan isi formulir di bawah ini untuk mendaftar.</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nama">Nama Lengkap:</label>
                    <input type="text" id="nama" name="nama">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password">
                </div>

                <div class="form-group-inline">
                    <label>Jenis Kelamin:</label>
                    <div class="options">
                        <label><input type="radio" name="jenis_kelamin" value="Laki-laki"> Laki-laki</label>
                        <label><input type="radio" name="jenis_kelamin" value="Perempuan"> Perempuan</label>
                    </div>
                </div>

                <div class="form-group-inline">
                    <label>Hobi:</label>
                    <div class="options">
                        <label><input type="checkbox" name="hobi" value="Musik"> Musik</label>
                        <label><input type="checkbox" name="hobi" value="Olahraga"> Olahraga</label>
                        <label><input type="checkbox" name="hobi" value="Membaca"> Membaca</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="kota">Pilih Kota:</label>
                    <select id="kota" name="kota">
                        <option value="Jakarta">Jakarta</option>
                        <option value="Bandung">Bandung</option>
                        <option value="Surabaya">Surabaya</option>
                        <option value="Yogyakarta">Yogyakarta</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pesan">Pesan Tambahan:</label>
                    <textarea id="pesan" name="pesan" rows="4" placeholder="Tulis pesan di sini..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Kirim</button>
            </form>
        </main>

        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.</p>
        </aside>
    </div>

</body>
</html>
