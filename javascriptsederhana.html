<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Cek Nilai</title>
    <style>
        /* CSS sederhana agar tampilan lebih rapi */
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #hasil {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            display: none; /* Disembunyikan sebelum tombol ditekan */
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cek Huruf Mutu</h2>
        
        <div class="form-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" placeholder="Masukkan NIM Anda">
        </div>
        
        <div class="form-group">
            <label for="nilai">Nilai Mata Kuliah:</label>
            <input type="number" id="nilai" placeholder="Masukkan Nilai (0 - 100)">
        </div>
        
        <button onclick="cekNilai()">Cek Nilai</button>

        <div id="hasil"></div>
    </div>

    <script>
        // b. JavaScript untuk menangani event klik tombol
        function cekNilai() {
            // Mengambil nilai dari elemen input
            let nim = document.getElementById("nim").value;
            let nilaiInput = document.getElementById("nilai").value;
            let divHasil = document.getElementById("hasil");

            // Validasi jika input kosong
            if (nim === "" || nilaiInput === "") {
                divHasil.style.display = "block";
                divHasil.innerHTML = "<span class='error'>NIM dan Nilai harus diisi!</span>";
                return;
            }

            // Mengubah tipe data nilai dari string menjadi angka (float)
            let nilai = parseFloat(nilaiInput);
            let hurufMutu = "";

            // c. Kondisi if-else untuk menentukan huruf mutu
            if (nilai < 0 || nilai > 100) {
                // Jika nilai di luar rentang 0-100
                divHasil.style.display = "block";
                divHasil.innerHTML = "<span class='error'>Nilai tidak valid!</span>";
                return; // Menghentikan fungsi
            } else if (nilai >= 80 && nilai <= 100) {
                hurufMutu = "A";
            } else if (nilai >= 70 && nilai < 80) { // menggunakan < 80 agar 79.9 tetap masuk B, sesuai rentang 70-79
                hurufMutu = "B";
            } else if (nilai >= 60 && nilai < 70) {
                hurufMutu = "C";
            } else if (nilai >= 50 && nilai < 60) {
                hurufMutu = "D";
            } else if (nilai >= 0 && nilai < 50) {
                hurufMutu = "E";
            }

            // d. Menampilkan huruf mutu di bawah form
            divHasil.style.display = "block";
            divHasil.innerHTML = `
                <p>NIM: <strong>${nim}</strong></p>
                <p>Nilai Angka: <strong>${nilai}</strong></p>
                <p>Huruf Mutu: <strong style="font-size: 20px; color: green;">${hurufMutu}</strong></p>
            `;
        }
    </script>

</body>
</html>
